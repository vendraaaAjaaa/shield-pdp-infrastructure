# Enterprise-stage overlay for Shield-PDP.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.enterprise.yml --profile stage1-core up -d
#   docker compose -f docker-compose.yml -f docker-compose.enterprise.yml --profile enterprise config
#
# This overlay does not replace the existing stack. It adds real support
# services and target trust-zone networks for the staged enterprise lab.

x-enterprise-core-env: &enterprise_core_env
  NODE_ENV: production
  PORT: 8080
  ENTERPRISE_JWT_ISSUER: ${ENTERPRISE_JWT_ISSUER:-shield-pdp-enterprise}
  ENTERPRISE_JWT_AUDIENCE: ${ENTERPRISE_JWT_AUDIENCE:-shield-pdp-internal}
  ENTERPRISE_JWT_SECRET: ${ENTERPRISE_JWT_SECRET:-shield-pdp-enterprise-lab-secret-change-before-production}
  SERVICE_ACCOUNT_SECRET: ${SERVICE_ACCOUNT_SECRET:-shield-service-account-lab-secret}
  LOG_INGEST_TOKEN: ${LOG_INGEST_TOKEN:-shield-log-ingest-lab-token}
  AUTH_SERVICE_URL: http://auth-service:8080
  LOG_COLLECTOR_URL: http://log-collector:8080
  SIEM_BRIDGE_URL: http://siem-bridge:8080
  DETECTION_ENGINE_URL: http://detection-engine:8080
  CORRELATION_ENGINE_URL: http://correlation-engine:8080
  ADVERSARY_CONTROL_URL: http://adversary-control:8080
  BEACON_SIM_URL: http://beacon-sim:8080
  REDIRECTOR_SIM_URL: http://redirector-sim:8080
  PIVOT_SIM_URL: http://pivot-sim:8080
  PERSISTENCE_SIM_URL: http://persistence-sim:8080
  DIGITAL_TWIN_URL: http://digital-twin:8080
  ATTACK_GRAPH_URL: http://attack-graph:8080
  CAMPAIGN_ORCHESTRATOR_URL: http://campaign-orchestrator:8080
  THREAT_HUNTING_URL: http://threat-hunting:8080
  COVERAGE_INTEL_URL: http://coverage-intel:8080
  CHAOS_SIM_URL: http://chaos-sim:8080
  INTELLIGENCE_DASHBOARD_URL: http://intelligence-dashboard:8080
  KUBERNETES_ORCHESTRATOR_URL: http://kubernetes-orchestrator:8080
  GITOPS_CONTROLLER_URL: http://gitops-controller:8080
  TELEMETRY_FABRIC_URL: http://telemetry-fabric:8080
  RESILIENCE_HUB_URL: http://resilience-hub:8080
  ENVIRONMENT_MANAGER_URL: http://environment-manager:8080
  ZERO_TRUST_MESH_URL: http://zero-trust-mesh:8080
  GOVERNANCE_ENGINE_URL: http://governance-engine:8080
  DELIVERY_GOVERNANCE_URL: http://delivery-governance:8080
  SCALE_DASHBOARD_URL: http://scale-dashboard:8080
  PIPELINE_TOKEN: ${PIPELINE_TOKEN:-lab-pipeline-token-stage3}
  STALE_TOKEN_GRACE_SECONDS: ${STALE_TOKEN_GRACE_SECONDS:-3600}
  STAGE3_TARGETS_ENABLED: ${STAGE3_TARGETS_ENABLED:-false}
  STAGE4_TARGETS_ENABLED: ${STAGE4_TARGETS_ENABLED:-false}
  STAGE5_TARGETS_ENABLED: ${STAGE5_TARGETS_ENABLED:-false}
  STAGE6_TARGETS_ENABLED: ${STAGE6_TARGETS_ENABLED:-false}
  STAGE7_TARGETS_ENABLED: ${STAGE7_TARGETS_ENABLED:-false}

x-enterprise-node-service: &enterprise_node_service
  build:
    context: ./services/enterprise-core
  profiles:
    - stage2-core
    - stage3-core
    - stage4-core
    - stage5-core
    - stage6-core
    - stage7-core
    - enterprise
  expose:
    - "8080"
  healthcheck:
    test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 10s
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp
  restart: unless-stopped

services:
  enterprise-redis:
    image: redis:7.2-alpine
    container_name: shield-pdp-enterprise-redis
    profiles:
      - stage1-core
      - stage2-core
      - stage3-core
      - stage4-core
      - stage5-core
      - stage6-core
      - stage7-core
      - enterprise
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - shield_pdp_enterprise_redis_data:/data
    networks:
      - shield_pdp_data
      - shield_pdp_enterprise
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  enterprise-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shield-pdp-enterprise-rabbitmq
    profiles:
      - stage1-core
      - stage2-core
      - stage3-core
      - stage4-core
      - stage5-core
      - stage6-core
      - stage7-core
      - enterprise
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-shield}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-shield_rabbitmq_lab_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-shield_lab}
    volumes:
      - shield_pdp_enterprise_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shield_pdp_data
      - shield_pdp_observability
      - shield_pdp_enterprise
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  vault-sim:
    image: hashicorp/vault:1.17
    container_name: shield-pdp-vault-sim
    profiles:
      - stage1-identity
      - stage2-core
      - stage3-core
      - stage4-core
      - stage5-core
      - stage6-core
      - stage7-core
      - enterprise
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-shield-pdp-lab-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DISABLE_MLOCK: "true"
    command: ["server", "-dev"]
    networks:
      - shield_pdp_identity
      - shield_pdp_data
    ports:
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  git:
    image: gitea/gitea:1.22-rootless
    container_name: shield-pdp-git
    profiles:
      - stage1-devops
      - enterprise
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: http://localhost:3001/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__security__INSTALL_LOCK: "true"
    volumes:
      - shield_pdp_gitea_data:/var/lib/gitea
      - shield_pdp_gitea_config:/etc/gitea
    networks:
      - shield_pdp_devops
      - shield_pdp_enterprise
      - shield_pdp_observability
    ports:
      - "127.0.0.1:3001:3000"
      - "127.0.0.1:2222:2222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: shield-pdp-mailpit
    profiles:
      - stage1-redteam
      - enterprise
    networks:
      - shield_pdp_teamserver
      - shield_pdp_enterprise
      - shield_pdp_observability
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  auth-service:
    <<: *enterprise_node_service
    container_name: shield-pdp-auth-service
    environment:
      <<: *enterprise_core_env
      SERVICE_MODE: auth
      SERVICE_NAME: auth-service
      SERVICE_ACCOUNT_ID: auth-service
    networks:
      - shield_pdp_identity
      - shield_pdp_enterprise
      - shield_pdp_observability
    depends_on:
      log-collector:
        condition: service_healthy

  log-collector:
