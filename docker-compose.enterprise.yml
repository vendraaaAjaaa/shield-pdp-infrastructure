    image: nginx:1.27-alpine
    container_name: shield-pdp-enterprise-gateway
    profiles:
      - stage2-core
      - stage3-core
      - stage4-core
      - stage5-core
      - stage6-core
      - stage7-core
      - enterprise
    entrypoint: ["nginx", "-g", "daemon off;"]
    user: "101:101"
    ports:
      - "0.0.0.0:3100:8080"
    volumes:
      - ./infrastructure/nginx/enterprise-gateway.conf:/etc/nginx/nginx.conf:ro
    networks:
      - shield_pdp_edge
      - shield_pdp_identity
      - shield_pdp_enterprise
      - shield_pdp_observability
    depends_on:
      auth-service:
        condition: service_healthy
      employee-portal:
        condition: service_healthy
      hr-portal:
        condition: service_healthy
      finance-portal:
        condition: service_healthy
