worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_x_request_id $shield_request_id {
        "" $request_id;
        default $http_x_request_id;
    }

    limit_req_zone $binary_remote_addr zone=enterprise_per_ip:10m rate=20r/s;

    log_format shield_enterprise_json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"service":"enterprise-gateway",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$shield_request_id",'
        '"auth_user":"$auth_user",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"user_agent":"$http_user_agent"'
    '}';

    access_log /dev/stdout shield_enterprise_json;
    error_log /dev/stderr warn;

    server {
        listen 8080;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'" always;

        limit_req zone=enterprise_per_ip burst=80 nodelay;
        client_max_body_size 1m;

        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"enterprise-gateway"}';
            add_header Content-Type application/json;
        }

        location = / {
            return 200 '{"service":"enterprise-gateway","routes":["/identity/","/employee/","/developer/","/internal/hr/","/internal/finance/","/internal/admin/","/internal/api/","/service/internal-api/","/service-discovery/","/devops/git/","/devops/ci/","/devops/artifacts/","/ci-hook/","/lab/secrets/","/observability/","/logs/","/siem/","/detections/","/correlation/","/purple/","/ops/","/beacons/","/redirector/","/pivots/","/persistence/","/digital-twin/","/attack-graph/","/campaigns/","/hunt/","/coverage/","/chaos/","/intelligence/","/platform/kubernetes/","/platform/gitops/","/telemetry-fabric/","/resilience/","/environments/","/zero-trust/","/governance/","/delivery-governance/","/scale/"]}';
            add_header Content-Type application/json;
        }

        location = /_auth_employee {
            internal;
            set $auth_backend "auth-service:8080";
            proxy_pass http://$auth_backend/gateway/authorize?roles=employee,developer,hr,finance,soc_analyst,admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Request-ID $shield_request_id;
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /_auth_developer {
