global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: shield-pdp-enterprise-core
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:8080
          - log-collector:8080
          - detection-engine:8080
          - correlation-engine:8080
          - telemetry-fabric:8080
          - scale-dashboard:8080
