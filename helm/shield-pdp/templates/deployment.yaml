apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shield-pdp.name" . }}-enterprise-core
  namespace: shield-intelligence
  labels:
    {{- include "shield-pdp.labels" . | nindent 4 }}
    app.kubernetes.io/component: enterprise-core
spec:
  replicas: {{ .Values.enterpriseCore.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "shield-pdp.name" . }}
      app.kubernetes.io/component: enterprise-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "shield-pdp.name" . }}
        app.kubernetes.io/component: enterprise-core
        shield.stage: {{ .Values.global.stage | quote }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: enterprise-core
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.enterpriseCore.port }}
          envFrom:
            - configMapRef:
                name: {{ include "shield-pdp.name" . }}-config
            - secretRef:
                name: {{ include "shield-pdp.name" . }}-lab-secret
          env:
            - name: SERVICE_MODE
              value: {{ .Values.enterpriseCore.serviceMode | quote }}
            - name: SERVICE_NAME
              value: {{ .Values.enterpriseCore.serviceName | quote }}
            - name: SERVICE_ACCOUNT_ID
              value: {{ .Values.enterpriseCore.serviceAccountId | quote }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.enterpriseCore.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
