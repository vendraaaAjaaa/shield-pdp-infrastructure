{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shield-pdp.name" . }}-ingress
  namespace: shield-edge
  labels:
    {{- include "shield-pdp.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.enterpriseCore.serviceName }}
                port:
                  number: {{ .Values.enterpriseCore.port }}
{{- end }}
