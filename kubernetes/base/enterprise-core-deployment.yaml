apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-stage7-service
  namespace: shield-intelligence
  labels:
    app.kubernetes.io/name: shield-pdp
    app.kubernetes.io/component: enterprise-core
    shield.stage: stage7
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shield-pdp
      app.kubernetes.io/component: enterprise-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shield-pdp
        app.kubernetes.io/component: enterprise-core
        shield.stage: stage7
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: enterprise-core
          image: shield-pdp-enterprise-core:stage7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: shield-enterprise-core-config
            - secretRef:
                name: shield-enterprise-core-lab-secret
          env:
            - name: SERVICE_MODE
              value: telemetry-fabric
            - name: SERVICE_NAME
              value: telemetry-fabric
            - name: SERVICE_ACCOUNT_ID
              value: telemetry-fabric
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
