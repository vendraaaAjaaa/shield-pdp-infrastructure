title: Shield-PDP API Upstream Failure
id: 61f1f1cf-2011-40f4-b8c7-a306b32492ad
status: stable
description: Detects gateway 5xx responses that indicate API startup, routing, or dependency failures.
author: Shield-PDP SOC Team
date: 2026/05/24
tags:
  - reliability.api
  - soc.monitoring
logsource:
  product: nginx
  service: shield_pdp_gateway
detection:
  selection:
    status|gte: 500
  condition: selection
fields:
  - timestamp
  - remote_addr
  - request_id
  - uri
  - status
  - upstream_status
  - request_time
level: high
